name: Security

# Variante leve de segurança para o site:
#   • Dependency Review — bloqueia PRs com dependências vulneráveis (tolerante
#     enquanto o Dependency graph não estiver habilitado).
#   • Secret Scan       — procura segredos vazados (gitleaks).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        # continue-on-error: exige o "Dependency graph" habilitado em
        # Settings → Code security and analysis. Remova quando o admin ativar.
        continue-on-error: true
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
