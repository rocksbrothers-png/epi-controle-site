name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validar site estático
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Verificar sintaxe dos arquivos JavaScript
        run: |
          set -e
          # Valida a sintaxe de todo JS versionado (ignorando node_modules).
          mapfile -d '' files < <(find . -type d -name node_modules -prune -o -name '*.js' -print0)
          if [ ${#files[@]} -eq 0 ]; then
            echo "Nenhum arquivo .js encontrado."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "node --check $f"
            node --check "$f"
          done

      - name: Conferir que o servidor carrega
        run: node --check server.js
